services:
  portfolio-v2:
    image: node:20-alpine
    container_name: portfolio-v2
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '3011:4173'
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    restart: unless-stopped
