services:
  portfolio-v3:
    image: node:20-alpine
    container_name: portfolio-v3
    working_dir: /app
    volumes:
      - .:/app
      - v3-node-modules:/app/node_modules
    ports:
      - '3012:4173'
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    restart: unless-stopped

volumes:
  v3-node-modules:
