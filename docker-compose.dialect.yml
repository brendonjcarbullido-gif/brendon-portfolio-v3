services:
  portfolio-v2-dialect:
    image: node:20-alpine
    container_name: portfolio-v2-dialect
    working_dir: /app
    volumes:
      - .:/app
      - dialect-node-modules:/app/node_modules
    ports:
      - '3012:4173'
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    restart: unless-stopped

volumes:
  dialect-node-modules:
